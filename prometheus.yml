global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'api-gateway'
    static_configs:
      - targets: ['api-gateway:8080']
    metrics_path: '/health'

  - job_name: 'students-mvc'
    static_configs:
      - targets: ['students-mvc:8080']
    metrics_path: '/health'

  - job_name: 'grades-mvc'
    static_configs:
      - targets: ['grades-mvc:8080']
    metrics_path: '/health'

  - job_name: 'rabbitmq'
    static_configs:
      - targets: ['rabbitmq:15692']

  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres:5432']
