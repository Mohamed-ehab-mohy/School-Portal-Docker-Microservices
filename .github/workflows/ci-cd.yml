name: CI/CD Pipeline

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  DOTNET_VERSION: "10.0.x"

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore solution
        run: dotnet restore SchoolPortal.slnx

      - name: Build solution
        run: dotnet build SchoolPortal.slnx --no-restore -c Release

      - name: Run students-mvc tests
        run: dotnet test students-mvc.Tests/students-mvc.Tests.csproj -c Release --no-build --verbosity normal --logger "trx;LogFileName=students-tests.trx"

      - name: Run grades-mvc tests
        run: dotnet test grades-mvc.Tests/grades-mvc.Tests.csproj -c Release --no-build --verbosity normal --logger "trx;LogFileName=grades-tests.trx"

      - name: Publish students-mvc
        run: dotnet publish students-mvc/students-mvc.csproj -c Release -o ${{ github.workspace }}/students-mvc-out

      - name: Publish grades-mvc
        run: dotnet publish grades-mvc/grades-mvc.csproj -c Release -o ${{ github.workspace }}/grades-mvc-out

      - name: Publish api-gateway
        run: dotnet publish api-gateway/api-gateway.csproj -c Release -o ${{ github.workspace }}/api-gateway-out

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            students-mvc.Tests/TestResults/*.trx
            grades-mvc.Tests/TestResults/*.trx

  docker-build:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build students-mvc image
        uses: docker/build-push-action@v5
        with:
          context: ./students-mvc
          push: false
          tags: school-portal/students-mvc:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build grades-mvc image
        uses: docker/build-push-action@v5
        with:
          context: ./grades-mvc
          push: false
          tags: school-portal/grades-mvc:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build api-gateway image
        uses: docker/build-push-action@v5
        with:
          context: ./api-gateway
          push: false
          tags: school-portal/api-gateway:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  push-to-docker-hub:
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push students-mvc
        uses: docker/build-push-action@v5
        with:
          context: ./students-mvc
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/school-portal-students:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/school-portal-students:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push grades-mvc
        uses: docker/build-push-action@v5
        with:
          context: ./grades-mvc
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/school-portal-grades:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/school-portal-grades:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push api-gateway
        uses: docker/build-push-action@v5
        with:
          context: ./api-gateway
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/school-portal-gateway:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/school-portal-gateway:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: push-to-docker-hub
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to SnapDeploy
        run: |
          echo "Deploy to SnapDeploy via API or CLI"
          echo "Use Docker Hub images: school-portal-students:latest, school-portal-grades:latest, school-portal-gateway:latest"
