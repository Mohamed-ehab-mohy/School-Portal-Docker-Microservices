name: CI/CD Pipeline

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  DOTNET_VERSION: "10.0.x"

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore students-mvc
        run: dotnet restore students-mvc/students-mvc.csproj

      - name: Build students-mvc
        run: dotnet build students-mvc/students-mvc.csproj --no-restore -c Release

      - name: Restore grades-mvc
        run: dotnet restore grades-mvc/grades-mvc.csproj

      - name: Build grades-mvc
        run: dotnet build grades-mvc/grades-mvc.csproj --no-restore -c Release

  docker-build:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build students-mvc image
        uses: docker/build-push-action@v5
        with:
          context: ./students-mvc
          push: false
          tags: school-portal/students-mvc:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build grades-mvc image
        uses: docker/build-push-action@v5
        with:
          context: ./grades-mvc
          push: false
          tags: school-portal/grades-mvc:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Railway
        run: |
          echo "Deploy to Railway via Railway CLI or API"
          echo "See RAILWAY_DEPLOY.md for manual deployment instructions"
