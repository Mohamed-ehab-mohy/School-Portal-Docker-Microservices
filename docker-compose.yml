services:
  postgres:
    image: postgres:16-alpine
    container_name: school-portal-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: school_portal
    ports:
      - "5432:5432"
    volumes:
      - school-portal-data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d
    networks:
      - school-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  students-mvc:
    build:
      context: ./students-mvc
      dockerfile: Dockerfile
    container_name: students-mvc
    ports:
      - "5001:8080"
    environment:
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=students_db;Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      - AdminPassword=${ADMIN_PASSWORD:-Admin@123}
      - ASPNETCORE_ENVIRONMENT=Development
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - school-network

  grades-mvc:
    build:
      context: ./grades-mvc
      dockerfile: Dockerfile
    container_name: grades-mvc
    ports:
      - "5002:8080"
    environment:
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=grades_db;Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      - StudentsService__BaseUrl=http://students-mvc:8080
      - ASPNETCORE_ENVIRONMENT=Development
    depends_on:
      postgres:
        condition: service_healthy
      students-mvc:
        condition: service_started
    networks:
      - school-network

volumes:
  school-portal-data:

networks:
  school-network:
    driver: bridge
